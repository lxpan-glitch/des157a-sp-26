<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS-Experimentation</title>
</head>
<body>
    <h1>Experiment 1: FizzBuzz</h1>
    <h2>Open the Console to see the numbers 1-100!</h2>

    <script>

        var startMessage = "--- FizzBuzz Experiment Starts ---";
        console.log(startMessage);

        for (var i = 1; i <= 100; i++) {
            
            if (i % 3 === 0) {
                console.log("Fizz");
            } 
            else if (i % 5 === 0) {
                console.log("Buzz");
            } 
            else {
                console.log(`Number: ${i}`);
            }
        } 

    </script>
</body>
</html>
